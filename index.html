<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Mehal</title>
    <style>
        body {
            background-color: #f7cac9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #333;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 80px;
            position: relative;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .yes-btn {
            background-color: #ff4757;
            color: white;
            z-index: 10;
        }

        .no-btn {
            background-color: #ced6e0;
            color: #333;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .love-message {
            font-size: 1.8rem;
            color: #ff4757;
            line-height: 1.6;
            padding: 20px;
            display: none;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <h1>Will you stay with me forever Mehal? 🥺</h1>
        <div class="btn-container">
            <button class="btn yes-btn" id="yesBtn">Yes</button>
            <button class="btn no-btn" id="noBtn">No</button>
        </div>
    </div>

    <div class="love-message" id="loveMessage">
        I love you so much! ❤️<br>
        Happy 1-Month Anniversary! 🎉<br>
        You keep me happyy<br>
        you keep my worldd soo much brighter<br>
        I hope we stayyy togetherrr
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const quizContainer = document.getElementById('quizContainer');
        const loveMessage = document.getElementById('loveMessage');

        yesBtn.addEventListener('click', () => {
            quizContainer.style.display = 'none';
            loveMessage.style.display = 'block';
        });

        noBtn.addEventListener('mouseover', () => {
            const containerRect = document.querySelector('.btn-container').getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();

            const maxX = containerRect.width - btnRect.width;
            const maxY = containerRect.height - btnRect.height;

            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        });
    </script>
</body>
</html>
