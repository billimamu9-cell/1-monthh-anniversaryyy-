<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Mehal</title>
    <style>
        body {
            background-color: #f7cac9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #333;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .btn-container {
            display: flex;
            gap: 40px; /* दोनों बटन के बीच की दूरी */
            justify-content: center;
            align-items: center;
            position: relative;
            width: 300px;
            height: 100px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .yes-btn {
            background-color: #ff4757;
            color: white;
        }

        .no-btn {
            background-color: #ced6e0;
            color: #333;
            position: absolute;
            left: 170px; /* शुरुआती पोजीशन Yes के ठीक बगल में */
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <h1>Will you stay with me forever Mehal? 🥺</h1>
        <div class="btn-container">
            <button class="btn yes-btn" id="yesBtn">Yes</button>
            <button class="btn no-btn" id="noBtn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');

        // Yes बटन दबाने पर नया पेज खुलेगा
        yesBtn.addEventListener('click', () => {
            window.open('https://billimamu9-cell.github.io/1-monthh-anniversaryyy-/', '_blank');
        });

        // No बटन पर कर्सर जाते ही वह अपनी पोजीशन बदल लेगा (भागेगा)
        noBtn.addEventListener('mouseover', () => {
            // बटन को स्क्रीन के अंदर ही रखने के लिए कैलकुलेशन
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'fixed'; // अब यह स्क्रीन पर कहीं भी जा सकता है
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });
    </script>
</body>
</html>
